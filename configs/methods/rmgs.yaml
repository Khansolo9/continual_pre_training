method: rmgs
method_params:
  probe_size: 100
  probe_interval: 50
  ema_alpha: 0.3
  beta: 2.0
  min_scale: 0.05

model:
  name: gpt2
  family: gpt2
  params_m: 124
  dtype: float32
  pretrained: true
  gradient_checkpointing: true
  trust_remote_code: false

training:
  domain_a:
    learning_rate: 5.0e-5
    batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_grad_norm: 1.0
  domain_b:
    learning_rate: 5.0e-5
    batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_grad_norm: 1.0

data:
  sequence_length: 512
  domain_a:
    name: wikitext-103
    tier: A-medium
    tokens: 10000000
  domain_b:
    name: arxiv_abstracts
    tier: B-medium
    tokens: 10000000

seed: 42
