method: bandit_replay
method_params:
  buffer_size_pct: 10
  arms: [0.0, 0.1, 0.25, 0.5, 0.75]
  initial_weights: [1, 1, 2, 1, 1]
  bandit_algorithm: exp3
  probe_size: 100
  probe_interval: 50
  exp3_gamma: 0.1
  exp3_eta: null

model:
  name: gpt2
  family: gpt2
  params_m: 124
  dtype: float32
  pretrained: true
  gradient_checkpointing: true
  trust_remote_code: false

training:
  domain_a:
    learning_rate: 5.0e-5
    batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_grad_norm: 1.0
  domain_b:
    learning_rate: 5.0e-5
    batch_size: 4
    gradient_accumulation_steps: 4
    warmup_ratio: 0.05
    weight_decay: 0.01
    max_grad_norm: 1.0

data:
  sequence_length: 512
  domain_a:
    name: wikitext-103
    tier: A-medium
    tokens: 10000000
  domain_b:
    name: arxiv_abstracts
    tier: B-medium
    tokens: 10000000

seed: 42
